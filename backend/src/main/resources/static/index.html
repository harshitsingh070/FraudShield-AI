<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SentinelAI Command Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
        #map { height: 70vh; width: 100%; background: #222; }
        #header { padding: 20px; text-align: center; background: #1a1a1a; border-bottom: 2px solid #ff4444; }
        
        /* Custom popups for Dark Theme */
        .leaflet-popup-content-wrapper { background: #222; color: #fff; border: 1px solid #444; }
        .leaflet-popup-tip { background: #222; }
        .popup-title { font-size: 1.1em; color: #ff4444; margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        .popup-metric { font-size: 0.9em; color: #ccc; }
        .risk-CRITICAL { color: #ff4444; font-weight: bold; }
        .risk-HIGH { color: #ffaa00; font-weight: bold; }
        .risk-MEDIUM { color: #ffff00; font-weight: bold; }
        .risk-LOW { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">
        <h1>SentinelAI: National Threat Isolation Command</h1>
        <p style="color: #888; margin-top: -10px;">Live Intelligence Map & Geospatial Hotspots</p>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Map
        const map = L.map('map').setView([23.957, 86.499], 5); // Centered roughly on India
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // Fetch active threat vectors using the optimized map endpoint
        fetch('/api/v1/threat/hotspots/map')
            .then(res => res.json())
            .then(data => {
                data.forEach(ring => {
                    // Choose color based on risk level
                    let ringColor = '#00ff00';
                    if (ring.risk_level === 'CRITICAL') ringColor = '#ff4444';
                    else if (ring.risk_level === 'HIGH') ringColor = '#ffaa00';
                    else if (ring.risk_level === 'MEDIUM') ringColor = '#ffff00';

                    // Draw the marker
                    L.circleMarker([ring.lat, ring.lon], {
                        color: ringColor,
                        radius: Math.max(ring.threat_score * 1.5, 6), // Scale visually based on 1-10 score
                        fillOpacity: 0.6,
                        weight: 2
                    }).addTo(map)
                    .bindPopup(`
                        <div class="popup-title"><b>${ring.location_name}</b></div>
                        <div class="popup-metric">
                            Threat Index: <span class="risk-${ring.risk_level}">${ring.threat_score.toFixed(1)}/10.0</span><br/>
                            Risk Level: <span class="risk-${ring.risk_level}">${ring.risk_level}</span><br/>
                            Fraud Type: ${ring.fraud_type}<br/>
                            Status: ${ring.status}
                        </div>
                    `);
                });
            })
            .catch(err => console.error("Error fetching hotspot data:", err));
    </script>
</body>
</html>
